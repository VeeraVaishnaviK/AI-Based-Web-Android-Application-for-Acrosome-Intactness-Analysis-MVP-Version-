# Render.com Blueprint Configuration for Acrosome Analysis

services:
  - type: web
    name: acrosome-api
    runtime: docker
    dockerContext: backend
    dockerfilePath: backend/Dockerfile
    plan: free
    region: singapore # Change to your nearest region
    envVars:
      - key: MONGODB_URL
        sync: false # Set as environment variable in Render Dashboard
      - key: DATABASE_NAME
        value: acrosome_db
      - key: HOST
        value: 0.0.0.0
      - key: PORT
        value: 8000
      - key: SECRET_KEY
        sync: false # Set as environment variable in Render Dashboard
      - key: ENCRYPTION_KEY
        sync: false # Set as environment variable in Render Dashboard

staticSites:
  - name: acrosome-frontend
    rootDirectory: frontend
    buildCommand: npm install && npm run build
    publishDir: dist
    envVars:
      - key: NODE_VERSION
        value: "20.17.0"
      - key: VITE_API_URL
        fromService:
          name: acrosome-api
          type: web
          property: host
    routes:
      # SPA fallback
      - type: rewrite
        source: /*
        destination: /index.html
